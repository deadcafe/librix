name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cc: [gcc, clang]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show compiler
        run: ${{ matrix.cc }} --version

      - name: Clean
        run: make clean

      - name: Run full test suite
        run: make test CC=${{ matrix.cc }}

      - name: Run flow-cache benchmark smoke test
        run: make -C samples/test bench CC=${{ matrix.cc }}
